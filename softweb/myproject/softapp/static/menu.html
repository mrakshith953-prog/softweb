<!DOCTYPE html>
<html>
<head>
<title>Menu</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8f8f8;
}

h1{
    background:#ff6b35;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}

.card{
    width:250px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px gray;
    text-align:center;
}

.card img{
    width:100%;
    height:180px;
}

.card h3{
    color:#ff6b35;
}

.price{
    color:green;
    font-size:20px;
    font-weight:bold;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

</style>
</head>

<body>

<h1> Our Special Menu</h1>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=600" alt="Biryani">
        <h3>Chicken Biryani</h3>
        <p class="price">270</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1512058564366-18510be2db19?w=600" alt="Fried Rice">
        <h3>Fried Rice</h3>
        <p class="price">150</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600" alt="Pizza">
        <h3>Pizza</h3>
        <p class="price">170</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600" alt="Burger">
        <h3>Burger</h3>
        <p class="price">120</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1601050690597-df0568f70950?w=600" alt="Paneer Tikka">
        <h3>Paneer Tikka</h3>
        <p class="price">170</p>
    </div>

  

    <div class="card">
        <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=600" alt="Ice Cream">
        <h3>Ice Cream</h3>
        <p class="price">90</p>
    </div>


</div>

<footer>
    Developed by Rakshith M
</footer>

</body>
</html>
